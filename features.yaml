# NekoClaw CE/EE Feature Registry
#
# edition_features.ee 中列出的 feature 仅在 EE 模式下启用。
# 运行时通过 FeatureGate 判断：检测 ee/ 目录存在 -> edition=ee -> 全部启用
#                             ee/ 不存在 -> edition=ce -> EE feature 禁用

edition_features:
  ee:
    - id: multi_org
      name: Multi-Organization Management
      description: 多猫舍创建、切换、成员管理

    - id: billing
      name: Plans & Billing
      description: 套餐管理、配额检查、用量统计

    - id: admin_members
      name: Admin Platform Members
      description: 管理平台成员（多管理员角色）

    - id: platform_admin
      name: Platform Admin Pages
      description: 超管页面（Organizations / Users / Plans / Members）

    - id: org_smtp_config
      name: Organization SMTP Config
      description: 猫舍级 SMTP 界面配置

    - id: multi_cluster
      name: Multi-Cluster Management
      description: 多 K8s 集群部署 + 跨集群网关代理

    - id: advanced_audit
      name: Advanced Operation Audit
      description: 全局操作审计中间件 + 查询导出

    - id: sso_ldap
      name: LDAP/SAML SSO
      description: 企业级 SSO 认证集成

    - id: advanced_rbac
      name: Advanced RBAC
      description: 细粒度角色权限控制

    - id: topology_audit
      name: Topology Audit Log
      description: 猫窝拓扑变更审计日志

    - id: performance_analytics
      name: Performance Analytics
      description: 猫咪性能快照采集与分析

    - id: llm_analytics
      name: LLM Usage Analytics
      description: 猫粮用量统计报表

    - id: network_egress_control
      name: Network Egress Control
      description: 实例级出站流量策略定制
