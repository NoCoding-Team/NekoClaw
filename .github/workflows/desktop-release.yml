name: Desktop Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: nekoclaw-desktop

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: nekoclaw-desktop/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./nekoclaw-desktop/src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "NekoClaw Desktop ${{ github.ref_name }}"
          releaseBody: |
            NekoClaw 桌面客户端 ${{ github.ref_name }}

            ### 下载

            | 平台 | 文件 |
            | --- | --- |
            | Windows | `.exe` NSIS 安装包 |
            | macOS (Intel) | `.dmg` (x86_64) |
            | macOS (Apple Silicon) | `.dmg` (aarch64) |
            | Linux | `.AppImage` / `.deb` |

            ### 首次配置

            安装并启动后，在配置页面填写 NekoClaw Backend URL（如 `http://your-server:8000`）即可连接。
          releaseDraft: true
          prerelease: false
          projectPath: "nekoclaw-desktop"
          args: --target ${{ matrix.target }}
          includeUpdaterJson: true
