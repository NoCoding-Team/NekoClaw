services:

  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    # 代码通过 volume 挂载，修改代码后重启容器即生效
    volumes:
      - ./backend/app:/app/app:ro
      - ./memory:/app/data/memory
      - ./skills:/app/data/skills
    env_file:
      - ./backend/.env
    environment:
      MEMORY_FILES_DIR: /app/data/memory
      SKILLS_FILES_DIR: /app/data/skills
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    extra_hosts:
      # 允许容器内通过 host.docker.internal 访问宿主机（外部 PG 在宿主机时使用）
      - "host.docker.internal:host-gateway"
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/app
