services:
  nekoclaw-backend:
    build:
      context: .
      dockerfile: nekoclaw-backend/Dockerfile
    env_file:
      - ./.env
    environment:
      DATABASE_NAME_SUFFIX: ""
      LLM_PROXY_URL: http://llm-proxy:8080
      LLM_PROXY_INTERNAL_URL: http://llm-proxy:8080
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped

  llm-proxy:
    build:
      context: nekoclaw-llm-proxy
    env_file:
      - ./.env
    ports:
      - "${LLM_PROXY_PORT:-1880}:8080"
    restart: unless-stopped

  portal:
    build:
      context: nekoclaw-portal
    depends_on:
      - nekoclaw-backend
    ports:
      - "${PORTAL_PORT:-80}:80"
    restart: unless-stopped

