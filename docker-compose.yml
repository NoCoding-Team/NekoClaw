  #     NEKOCLAW_BACKEND_URL: http://nekoclaw-backend:8000
  #     NEKOCLAW_API_TOKEN: ${NEKOCLAW_API_TOKEN:-}
  #     NEKOCLAW_INSTANCE_ID: ${NEKOCLAW_INSTANCE_ID:-}
  #     ZEROCLAW_GATEWAY_URL: ${ZEROCLAW_GATEWAY_URL:-http://zeroclaw:8080}
  #   command: ["--runtime", "zeroclaw"]
  #   restart: unless-stopped

volumes:
  pg_data:
