apiVersion: v1
kind: Namespace
metadata:
  name: nekoclaw
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nekoclaw-config
  namespace: nekoclaw
data:
  APP_NAME: "NekoClaw"
  DATABASE_URL: "postgresql+asyncpg://nekoclaw:nekoclaw@postgres:5432/nekoclaw"
  LLM_PROXY_URL: "http://nekoclaw-llm-proxy:8080"
  LLM_PROXY_INTERNAL_URL: "http://nekoclaw-llm-proxy:8080"
---
apiVersion: v1
kind: Secret
metadata:
  name: nekoclaw-secrets
  namespace: nekoclaw
type: Opaque
stringData:
  JWT_SECRET: "change-me-in-production"
  ENCRYPTION_KEY: "change-me-32-bytes-base64-key__="
  POSTGRES_PASSWORD: "nekoclaw"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nekoclaw-backend
  namespace: nekoclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nekoclaw-backend
  template:
    metadata:
      labels:
        app: nekoclaw-backend
    spec:
      containers:
        - name: backend
          image: nekoclaw-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: nekoclaw-config
            - secretRef:
                name: nekoclaw-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: nekoclaw-backend
  namespace: nekoclaw
spec:
  selector:
    app: nekoclaw-backend
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nekoclaw-llm-proxy
  namespace: nekoclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nekoclaw-llm-proxy
  template:
    metadata:
      labels:
        app: nekoclaw-llm-proxy
    spec:
      containers:
        - name: llm-proxy
          image: nekoclaw-llm-proxy:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: nekoclaw-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: nekoclaw-llm-proxy
  namespace: nekoclaw
spec:
  selector:
    app: nekoclaw-llm-proxy
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nekoclaw-portal
  namespace: nekoclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nekoclaw-portal
  template:
    metadata:
      labels:
        app: nekoclaw-portal
    spec:
      containers:
        - name: portal
          image: nekoclaw-portal:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: nekoclaw-portal
  namespace: nekoclaw
spec:
  selector:
    app: nekoclaw-portal
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nekoclaw-ingress
  namespace: nekoclaw
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
    - host: nekoclaw.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: nekoclaw-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nekoclaw-portal
                port:
                  number: 80
